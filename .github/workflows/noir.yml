name: "noir workflow"

on:
  push:
    branches:
      - main
    paths:
      - "packages/tokens/src/confidential/circuits/**"
      - ".github/workflows/noir.yml"
  pull_request:
    paths:
      - "packages/tokens/src/confidential/circuits/**"
      - ".github/workflows/noir.yml"
  workflow_dispatch:

# Same concurrency policy as the Rust workflow: cancel in-flight runs for a PR
# branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep CI pinned to the same nargo + bb versions contributors run locally.
  # Bump together; the VK extraction pipeline (vks/) is byte-sensitive to bb.
  NARGO_VERSION: 1.0.0-beta.11
  BB_VERSION: 0.87.0

jobs:
  check-test-info:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tokens/src/confidential/circuits

    steps:
      - name: git checkout
        uses: actions/checkout@v4
        with:
          # This job only reads source files -- no push, no API calls. Drop
          # the persisted GITHUB_TOKEN so a compromised dependency in any
          # subsequent step can't exfiltrate it.
          persist-credentials: false

      - name: Install noirup
        # noirup is the official installer; it lands at ~/.nargo/bin/nargo.
        # The install script is pinned to a specific commit (not the moving
        # `main` branch) and its SHA256 is checked before execution so a
        # silently rewritten upstream cannot subvert this job. Bump the URL
        # and the hash together when intentionally tracking new upstream.
        env:
          NOIRUP_INSTALL_URL: https://raw.githubusercontent.com/noir-lang/noirup/c3bc9922bf7eeafdaba08fb6518776c4ba263a8c/install
          NOIRUP_INSTALL_SHA256: 89dde59d8ef9e7794d694abca097fa139fa7395b947cb7b0b7a8d1839c737d8b
        run: |
          curl -fsSL "$NOIRUP_INSTALL_URL" -o /tmp/noirup-install.sh
          echo "$NOIRUP_INSTALL_SHA256  /tmp/noirup-install.sh" | sha256sum -c -
          bash /tmp/noirup-install.sh
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
        working-directory: ${{ github.workspace }}

      - name: Pin nargo version
        run: noirup -v "$NARGO_VERSION"

      - name: Install bbup
        # bbup is the official Barretenberg installer; lands at ~/.bb/bb.
        # Same pinning + SHA256 verification as noirup above.
        env:
          BBUP_INSTALL_URL: https://raw.githubusercontent.com/AztecProtocol/aztec-packages/073ea66ad92c53ebbf7be70d28973a68a8628942/barretenberg/bbup/install
          BBUP_INSTALL_SHA256: 3e4b7ce2d18e7680b897d23de0328ba6365616b2c7d592a5ebb74a368f364efd
        run: |
          curl -fsSL "$BBUP_INSTALL_URL" -o /tmp/bbup-install.sh
          echo "$BBUP_INSTALL_SHA256  /tmp/bbup-install.sh" | sha256sum -c -
          bash /tmp/bbup-install.sh
          echo "$HOME/.bb" >> "$GITHUB_PATH"
        working-directory: ${{ github.workspace }}

      - name: Pin bb version
        run: bbup -v "$BB_VERSION"

      - name: nargo test
        run: nargo test

      - name: Diff extracted VKs against committed artifacts
        # Re-extracts the VK for each per-operation circuit using the pinned
        # bb version and compares against the committed `vks/*.vk.json`.
        # Mirrors the constraint-baseline diff: drift means either the
        # circuit changed (regenerate and commit in this PR) or the
        # toolchain drifted (don't regenerate -- investigate).
        run: |
          mkdir -p /tmp/vks-current
          cp vks/*.vk.json /tmp/vks-current/ 2>/dev/null || true
          rm -f vks/*.vk.json
          ./scripts/extract_vks.sh

          # Exclude README.md from the diff; only `.vk.json` artifacts
          # should be compared.
          if ! diff -q --exclude='*.md' /tmp/vks-current vks > /tmp/vks-diff 2>&1; then
            {
              echo ""
              echo "### ❌ VK artifact drift detected"
              echo ""
              cat /tmp/vks-diff
              echo ""
              echo "If this is intentional, regenerate VKs in this PR:"
              echo ""
              echo '```'
              echo "cd packages/tokens/src/confidential/circuits"
              echo "./scripts/extract_vks.sh"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Diff nargo info against checked-in baseline
        # Fails the build if the per-primitive constraint counts drift from
        # `constraints.baseline`. When the lib genuinely changes, regenerate
        # the baseline in the same PR (the failure message tells reviewers
        # how) so the delta is visible side-by-side in the diff.
        #
        # LC_ALL=C is load-bearing -- it makes `sort` use byte order, which
        # is the only ordering stable across macOS (where contributors
        # regenerate the baseline) and Ubuntu (CI).
        env:
          LC_ALL: C
        run: |
          nargo info | grep '^|' | sort > /tmp/nargo-info.current
          grep -v '^#' constraints.baseline | sed '/^[[:space:]]*$/d' > /tmp/nargo-info.baseline

          {
            echo "## Noir constraint baseline"
            echo ""
            echo '```'
            cat /tmp/nargo-info.current
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if ! diff -u /tmp/nargo-info.baseline /tmp/nargo-info.current; then
            {
              echo ""
              echo "### ❌ Baseline drift detected"
              echo ""
              echo "The current \`nargo info\` output differs from \`constraints.baseline\`."
              echo "If this is intentional, regenerate the baseline in this PR:"
              echo ""
              echo '```'
              echo "cd packages/tokens/src/confidential/circuits"
              echo "LC_ALL=C nargo info | grep '^|' | LC_ALL=C sort > constraints.baseline"
              echo '```'
              echo ""
              echo "(Leave the header comments in \`constraints.baseline\` intact.)"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
